<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>의학영어 시험대비</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="site-title">의학영어<span class="accent"> · </span>시험대비</div>
    <nav class="site-nav">
      <a href="index.html" class="active">홈</a>
      <a href="passages/index.html">본문 학습</a>
      <a href="quiz/index.html">문제 학습</a>
    </nav>
  </div>
</header>

<main>
  <div class="eyebrow">MEDICAL ENGLISH · EXAM PREP</div>
  <h1 class="page-title">의학영어 시험대비</h1>
  <p class="page-subtitle">시험범위 본문 4개와 역대 기출문제를 정리한 학습 자료입니다.</p>

  <div class="section-label">본문 학습</div>
  <div class="card-grid" id="passage-cards"></div>

  <div class="section-label">문제 학습</div>
  <a href="quiz/index.html" class="quiz-card">
    <div class="num" style="font-family: var(--font-mono); font-size:11px; color:#8B9088;">QUIZ</div>
    <h3>기출문제 연습</h3>
    <p>역대 기출문제를 모아 본문별 · 유형별로 풀어볼 수 있습니다.</p>
    <span class="btn">시작하기 →</span>
  </a>
</main>

<footer class="site-footer">의학영어 시험대비 자료 · 개인 학습용</footer>

<script src="assets/app.js"></script>
<script>
  const grid = document.getElementById("passage-cards");
  grid.innerHTML = PASSAGE_META.map((p) => `
    <a class="passage-card" href="passages/passage.html?id=${p.id}">
      <div class="num">${p.num}</div>
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
    </a>
  `).join("");
</script>
</body>
</html>
